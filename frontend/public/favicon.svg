<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rounded square in the brand indigo with a clean wordmark glyph: a
       capital "T" plus a film-strip rectangle. Reads as "text → frames"
       at 16×16 without relying on color. -->
  <rect width="32" height="32" rx="7" fill="url(#g)" />
  <path d="M8 10h12" stroke="#fff" stroke-width="2.4" stroke-linecap="round" />
  <path d="M14 10v13" stroke="#fff" stroke-width="2.4" stroke-linecap="round" />
  <rect x="17" y="16.5" width="8" height="6" rx="1.4" stroke="#fff" stroke-width="1.8" />
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1" />
      <stop offset="1" stop-color="#4338ca" />
    </linearGradient>
  </defs>
</svg>
